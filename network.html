<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>連携校一覧 - 遠隔授業配信センター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans JP"', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
  
  <!-- ナビゲーション -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="index.html" class="flex items-center gap-2">
            <div class="bg-blue-600 text-white p-2 rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-open"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </div>
            <span class="font-bold text-xl tracking-tight text-slate-900" id="site-title"></span>
          </a>
        </div>
        <nav class="hidden md:flex items-center space-x-1">
          <a href="index.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">ホーム</a>
          <a href="about.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">センター概要</a>
          <a href="academics.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">授業・サポート</a>
          <a href="network.html" class="px-3 py-2 rounded-md text-sm font-medium text-blue-700 bg-blue-50">連携校一覧</a>
          <a href="resources.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">資料・FAQ</a>
          <a href="contact.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">お問い合わせ</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="py-12 bg-slate-50 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="mb-12 text-center">
        <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-4">受信校・連携校一覧</h1>
        <p class="text-lg text-slate-600 max-w-2xl mx-auto">
          当センターから授業を配信している学校の一覧です。
          導入校は年次で拡大しており、より多くの生徒へ学びの機会を提供しています。
        </p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-16">
        <div class="lg:col-span-2">
          <div class="rounded-xl border border-slate-200 bg-white text-slate-950 shadow-sm h-full">
            <div class="flex flex-col space-y-1.5 p-6">
              <div class="flex items-center gap-3 mb-2">
                <div class="p-2 bg-blue-100 text-blue-600 rounded-lg">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map-pin"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <h3 class="font-semibold leading-none tracking-tight text-2xl">連携校マップ</h3>
              </div>
            </div>
            <div class="p-6 pt-0">
              <div class="bg-slate-200 w-full h-[500px] rounded-xl flex items-center justify-center relative overflow-hidden">
                <img src="https://picsum.photos/seed/map/1200/800" alt="Map Placeholder" class="absolute inset-0 w-full h-full object-cover opacity-50" referrerpolicy="no-referrer">
                <div class="absolute inset-0 bg-slate-900/10 flex items-center justify-center">
                  <div class="bg-white/90 backdrop-blur-sm p-6 rounded-xl shadow-lg text-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map-pin text-blue-600 mx-auto mb-4"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                    <h3 class="text-xl font-bold text-slate-900 mb-2">県内全域マップ</h3>
                    <p class="text-slate-600" id="network-map-desc">
                      <!-- data.js から読み込み -->
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="space-y-6">
          <div class="rounded-xl border border-slate-200 bg-white text-slate-950 shadow-sm">
            <div class="flex flex-col space-y-1.5 p-6">
              <div class="flex items-center gap-3 mb-2">
                <div class="p-2 bg-emerald-100 text-emerald-600 rounded-lg">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-school"><path d="M14 22v-4a2 2 0 1 0-4 0v4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M18 5v17"/><path d="m4 6 8-4 8 4"/><path d="M6 5v17"/><circle cx="12" cy="9" r="2"/></svg>
                </div>
                <h3 class="font-semibold leading-none tracking-tight text-xl">地域ごとの導入状況</h3>
              </div>
            </div>
            <div class="p-6 pt-0">
              <div class="space-y-4" id="regions-container">
                <!-- data.js から読み込み -->
              </div>
            </div>
          </div>
        </div>
      </div>

      <div>
        <h2 class="text-2xl font-bold text-slate-900 mb-6">センターとつながる学校一覧</h2>
        <div class="rounded-xl border border-slate-200 bg-white text-slate-950 shadow-sm overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="bg-slate-100 border-b border-slate-200">
                  <th class="py-4 px-6 font-semibold text-slate-700">学校名</th>
                  <th class="py-4 px-6 font-semibold text-slate-700">所在地</th>
                  <th class="py-4 px-6 font-semibold text-slate-700">受講可能科目（例）</th>
                  <th class="py-4 px-6 font-semibold text-slate-700">導入年度</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-100" id="schools-table-body">
                <!-- data.js から読み込み -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- フッター -->
  <footer class="bg-slate-900 text-slate-300 py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div>
          <div class="flex items-center gap-2 mb-4">
            <div class="bg-blue-600 text-white p-1.5 rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-open"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </div>
            <span class="font-bold text-lg text-white" id="footer-site-title"></span>
          </div>
        </div>
        <div>
          <h3 class="text-white font-semibold mb-4">リンク</h3>
          <ul class="space-y-2 text-sm">
            <li><a href="about.html" class="hover:text-white transition-colors">センター概要</a></li>
            <li><a href="academics.html" class="hover:text-white transition-colors">授業・サポート体制</a></li>
            <li><a href="network.html" class="hover:text-white transition-colors">連携校一覧</a></li>
            <li><a href="resources.html" class="hover:text-white transition-colors">資料・FAQ</a></li>
          </ul>
        </div>
        <div>
          <h3 class="text-white font-semibold mb-4">お問い合わせ</h3>
          <ul class="space-y-2 text-sm text-slate-400" id="footer-contact"></ul>
        </div>
      </div>
      <div class="border-t border-slate-800 mt-8 pt-8 text-sm text-center text-slate-500">
        &copy; <span id="current-year"></span> 遠隔授業配信センター All rights reserved.
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
