<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>授業・サポート体制 - 遠隔授業配信センター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans JP"', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
  
  <!-- ナビゲーション -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="index.html" class="flex items-center gap-2">
            <div class="bg-blue-600 text-white p-2 rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-open"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </div>
            <span class="font-bold text-xl tracking-tight text-slate-900" id="site-title"></span>
          </a>
        </div>
        <nav class="hidden md:flex items-center space-x-1">
          <a href="index.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">ホーム</a>
          <a href="about.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">センター概要</a>
          <a href="academics.html" class="px-3 py-2 rounded-md text-sm font-medium text-blue-700 bg-blue-50">授業・サポート</a>
          <a href="network.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">連携校一覧</a>
          <a href="resources.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">資料・FAQ</a>
          <a href="contact.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">お問い合わせ</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="py-12 bg-white min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="mb-16 text-center">
        <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-4">授業・サポート体制</h1>
        <p class="text-lg text-slate-600 max-w-2xl mx-auto">
          提供する科目や、最新のICT機器を活用した授業環境、そして手厚い学習支援についてご紹介します。
        </p>
      </div>

      <!-- 科目一覧 -->
      <section class="mb-24">
        <div class="flex items-center gap-3 mb-8">
          <div class="p-3 bg-blue-100 text-blue-600 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-open"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </div>
          <h2 class="text-3xl font-bold text-slate-900">提供する授業・科目一覧</h2>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
          <div class="lg:col-span-3">
            <div class="rounded-xl border border-slate-200 bg-white text-slate-950 shadow-sm h-full">
              <div class="flex flex-col space-y-1.5 p-6">
                <h3 class="font-semibold leading-none tracking-tight text-xl">遠隔授業で提供する教科・科目</h3>
              </div>
              <div class="p-6 pt-0">
                <div class="overflow-x-auto">
                  <table class="w-full text-left border-collapse">
                    <thead>
                      <tr class="border-b-2 border-slate-200 bg-slate-50">
                        <th class="py-3 px-4 font-semibold text-slate-700">教科</th>
                        <th class="py-3 px-4 font-semibold text-slate-700">科目名</th>
                        <th class="py-3 px-4 font-semibold text-slate-700">対象学年</th>
                        <th class="py-3 px-4 font-semibold text-slate-700">授業形態</th>
                      </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100" id="subjects-table-body">
                      <!-- data.js から読み込み -->
                    </tbody>
                  </table>
                </div>
                <p class="text-sm text-slate-500 mt-4">
                  ※配信科目は学年進行で拡充され、多様な科目を開設可能にしています。
                </p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- フッター -->
  <footer class="bg-slate-900 text-slate-300 py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div>
          <div class="flex items-center gap-2 mb-4">
            <div class="bg-blue-600 text-white p-1.5 rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-open"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </div>
            <span class="font-bold text-lg text-white" id="footer-site-title"></span>
          </div>
        </div>
        <div>
          <h3 class="text-white font-semibold mb-4">リンク</h3>
          <ul class="space-y-2 text-sm">
            <li><a href="about.html" class="hover:text-white transition-colors">センター概要</a></li>
            <li><a href="academics.html" class="hover:text-white transition-colors">授業・サポート体制</a></li>
            <li><a href="network.html" class="hover:text-white transition-colors">連携校一覧</a></li>
            <li><a href="resources.html" class="hover:text-white transition-colors">資料・FAQ</a></li>
          </ul>
        </div>
        <div>
          <h3 class="text-white font-semibold mb-4">お問い合わせ</h3>
          <ul class="space-y-2 text-sm text-slate-400" id="footer-contact"></ul>
        </div>
      </div>
      <div class="border-t border-slate-800 mt-8 pt-8 text-sm text-center text-slate-500">
        &copy; <span id="current-year"></span> 遠隔授業配信センター All rights reserved.
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
