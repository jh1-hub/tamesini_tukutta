<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遠隔授業配信センター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans JP"', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
  
  <!-- ナビゲーション（全ページ共通） -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="index.html" class="flex items-center gap-2">
            <div class="bg-blue-600 text-white p-2 rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-open"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </div>
            <span class="font-bold text-xl tracking-tight text-slate-900" id="site-title">
              <!-- data.js から読み込み -->
            </span>
          </a>
        </div>
        <nav class="hidden md:flex items-center space-x-1">
          <a href="index.html" class="px-3 py-2 rounded-md text-sm font-medium text-blue-700 bg-blue-50">ホーム</a>
          <a href="about.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">センター概要</a>
          <a href="academics.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">授業・サポート</a>
          <a href="network.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">連携校一覧</a>
          <a href="resources.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">資料・FAQ</a>
          <a href="contact.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">お問い合わせ</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <!-- ヒーローセクション -->
    <section class="relative bg-slate-900 text-white overflow-hidden">
      <div class="absolute inset-0">
        <img src="https://images.unsplash.com/photo-1524178232363-1fb2b075b655?q=80&w=2070&auto=format&fit=crop" alt="Remote Education" class="w-full h-full object-cover opacity-30">
        <div class="absolute inset-0 bg-gradient-to-r from-slate-900 via-slate-900/80 to-transparent"></div>
      </div>
      <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 lg:py-32">
        <div class="max-w-2xl">
          <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold tracking-tight mb-6 leading-tight">
            すべての生徒に、<br />
            <span class="text-blue-400">多様で質の高い学び</span>を。
          </h1>
          <p class="text-lg md:text-xl text-slate-300 mb-8 leading-relaxed" id="hero-description">
            <!-- data.js から読み込み -->
          </p>
          <div class="flex flex-col sm:flex-row gap-4">
            <a href="academics.html" class="inline-flex items-center justify-center rounded-md text-lg font-medium bg-blue-600 text-white hover:bg-blue-700 h-11 px-8">
              授業内容を見る
            </a>
            <a href="contact.html" class="inline-flex items-center justify-center rounded-md text-lg font-medium border border-white/20 bg-white/10 text-white hover:bg-white/20 h-11 px-8">
              お問い合わせ・見学
            </a>
          </div>
        </div>
      </div>
    </section>

    <!-- ニュースセクション -->
    <section class="py-20 bg-white">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between mb-8">
          <h2 class="text-2xl font-bold text-slate-900">活動報告・ニュース</h2>
        </div>
        <div class="space-y-4" id="news-container">
          <!-- data.js から読み込み -->
        </div>
      </div>
    </section>
  </main>

  <!-- フッター（全ページ共通） -->
  <footer class="bg-slate-900 text-slate-300 py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div>
          <div class="flex items-center gap-2 mb-4">
            <div class="bg-blue-600 text-white p-1.5 rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-open"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </div>
            <span class="font-bold text-lg text-white" id="footer-site-title">
              <!-- data.js から読み込み -->
            </span>
          </div>
        </div>
        <div>
          <h3 class="text-white font-semibold mb-4">リンク</h3>
          <ul class="space-y-2 text-sm">
            <li><a href="about.html" class="hover:text-white transition-colors">センター概要</a></li>
            <li><a href="academics.html" class="hover:text-white transition-colors">授業・サポート体制</a></li>
            <li><a href="network.html" class="hover:text-white transition-colors">連携校一覧</a></li>
            <li><a href="resources.html" class="hover:text-white transition-colors">資料・FAQ</a></li>
          </ul>
        </div>
        <div>
          <h3 class="text-white font-semibold mb-4">お問い合わせ</h3>
          <ul class="space-y-2 text-sm text-slate-400" id="footer-contact">
            <!-- data.js から読み込み -->
          </ul>
        </div>
      </div>
      <div class="border-t border-slate-800 mt-8 pt-8 text-sm text-center text-slate-500">
        &copy; <span id="current-year"></span> 遠隔授業配信センター All rights reserved.
      </div>
    </div>
  </footer>

  <!-- データを読み込んで画面に反映するスクリプト -->
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
